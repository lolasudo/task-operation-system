openapi: 3.0.3
info:
  title: Docker Camera Management API
  version: 1.0.0
servers:
  - url: http://localhost:8080/api/v1
    description: Local dev server
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
      required: [code, message]
    PageMetadata:
      type: object
      properties:
        page:
          type: integer
        page_size:
          type: integer
        total_elements:
          type: integer
        total_pages:
          type: integer
      required: [page, page_size, total_elements, total_pages]
    Server:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        hostname:
          type: string
        ip_address:
          type: string
        location:
          type: string
        docker_version:
          type: string
        status:
          type: string
          enum: [ONLINE, OFFLINE, MAINTENANCE]
        labels:
          type: object
          additionalProperties:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - name
        - hostname
        - ip_address
        - status
        - created_at
        - updated_at
    ServerCreateRequest:
      type: object
      properties:
        name:
          type: string
        hostname:
          type: string
        ip_address:
          type: string
        location:
          type: string
        docker_version:
          type: string
        labels:
          type: object
          additionalProperties:
            type: string
      required: [name, hostname, ip_address]
    ServerUpdateRequest:
      type: object
      properties:
        name:
          type: string
        hostname:
          type: string
        ip_address:
          type: string
        location:
          type: string
        docker_version:
          type: string
        status:
          type: string
          enum: [ONLINE, OFFLINE, MAINTENANCE]
        labels:
          type: object
          additionalProperties:
            type: string
    Camera:
      type: object
      properties:
        id:
          type: string
          format: uuid
        server_id:
          type: string
          format: uuid
        name:
          type: string
        ip_address:
          type: string
        rtsp_url:
          type: string
        status:
          type: string
          enum: [RUNNING, STOPPED, ERROR]
        resolution:
          type: string
        fps:
          type: integer
        container_id:
          type: string
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        last_heartbeat_at:
          type: string
          format: date-time
          nullable: true
        location:
          type: string
        tags:
          type: array
          items:
            type: string
      required:
        - id
        - server_id
        - name
        - ip_address
        - rtsp_url
        - status
        - is_active
        - created_at
        - updated_at
    CameraCreateRequest:
      type: object
      properties:
        server_id:
          type: string
          format: uuid
        name:
          type: string
        ip_address:
          type: string
        rtsp_url:
          type: string
        resolution:
          type: string
        fps:
          type: integer
        container_id:
          type: string
        is_active:
          type: boolean
        location:
          type: string
        tags:
          type: array
          items:
            type: string
      required:
        - server_id
        - name
        - ip_address
        - rtsp_url
        - is_active
    CameraUpdateRequest:
      type: object
      properties:
        server_id:
          type: string
          format: uuid
        name:
          type: string
        ip_address:
          type: string
        rtsp_url:
          type: string
        status:
          type: string
          enum: [RUNNING, STOPPED, ERROR]
        resolution:
          type: string
        fps:
          type: integer
        container_id:
          type: string
        is_active:
          type: boolean
        location:
          type: string
        tags:
          type: array
          items:
            type: string
    PagedServersResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Server'
        meta:
          $ref: '#/components/schemas/PageMetadata'
      required: [items, meta]
    PagedCamerasResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Camera'
        meta:
          $ref: '#/components/schemas/PageMetadata'
      required: [items, meta]
security:
  - bearerAuth: []
paths:
  /health:
    get:
      summary: Health check
      security: []
      responses:
        '200':
          description: Service is healthy
  /servers:
    get:
      summary: List servers
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
          required: false
        - in: query
          name: page_size
          schema:
            type: integer
            minimum: 1
            maximum: 100
          required: false
        - in: query
          name: status
          schema:
            type: string
            enum: [ONLINE, OFFLINE, MAINTENANCE]
        - in: query
          name: location
          schema:
            type: string
        - in: query
          name: search
          description: Search by name or hostname
          schema:
            type: string
      responses:
        '200':
          description: Paged servers list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedServersResponse'
        '401':
          description: Unauthorized
    post:
      summary: Create server
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServerCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Server'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
        '409':
          description: Conflict (duplicate name)
  /servers/{id}:
    get:
      summary: Get server by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Server'
        '401':
          description: Unauthorized
        '404':
          description: Not found
    put:
      summary: Update server
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServerUpdateRequest'
      responses:
        '200':
          description: Updated server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Server'
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '404':
          description: Not found
    delete:
      summary: Delete server
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Deleted
        '401':
          description: Unauthorized
        '404':
          description: Not found
  /servers/{id}/cameras:
    get:
      summary: List cameras on server
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
        - in: query
          name: page_size
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Cameras list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedCamerasResponse'
        '401':
          description: Unauthorized
        '404':
          description: Server not found
  /servers/{id}/actions/restart:
    post:
      summary: Restart all camera containers on server
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '202':
          description: Restart scheduled
        '401':
          description: Unauthorized
        '404':
          description: Server not found
  /cameras:
    get:
      summary: List cameras
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
        - in: query
          name: page_size
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - in: query
          name: status
          schema:
            type: string
            enum: [RUNNING, STOPPED, ERROR]
        - in: query
          name: server_id
          schema:
            type: string
        - in: query
          name: is_active
          schema:
            type: boolean
        - in: query
          name: search
          description: Search by name, ip or rtsp_url
          schema:
            type: string
      responses:
        '200':
          description: Paged cameras list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedCamerasResponse'
        '401':
          description: Unauthorized
    post:
      summary: Create camera
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CameraCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Camera'
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '404':
          description: Server not found
  /cameras/{id}:
    get:
      summary: Get camera by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Camera
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Camera'
        '401':
          description: Unauthorized
        '404':
          description: Not found
    put:
      summary: Update camera
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CameraUpdateRequest'
      responses:
        '200':
          description: Updated camera
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Camera'
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '404':
          description: Not found
    delete:
      summary: Delete camera
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Deleted
        '401':
          description: Unauthorized
        '404':
          description: Not found
  /cameras/{id}/actions/start:
    post:
      summary: Start camera container
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '202':
          description: Start scheduled
        '401':
          description: Unauthorized
        '404':
          description: Not found
  /cameras/{id}/actions/stop:
    post:
      summary: Stop camera container
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '202':
          description: Stop scheduled
        '401':
          description: Unauthorized
        '404':
          description: Not found
  /cameras/{id}/actions/restart:
    post:
      summary: Restart camera container
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '202':
          description: Restart scheduled
        '401':
          description: Unauthorized
        '404':
          description: Not found
